<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; font-src https://cdn.jsdelivr.net; connect-src 'self'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" />
  <meta name="description" content="Open-QnA Studio generates Q&A pairs, MCQs, and short written prompts from source content with source-grounded checks." />
  <title>Open-QnA Studio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <noscript>
    <div class="alert alert-danger m-3">Open-QnA Studio requires JavaScript to generate and export question sets.</div>
  </noscript>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="container py-4 py-lg-5">
    <div class="text-center mb-4">
      <h1 class="display-5 fw-bold text-gradient">Open-QnA Studio</h1>
      <p class="lead text-white-75">Turn source content into Q&A pairs, MCQs, and short written prompts.</p>
    </div>

    <div class="row g-4">
      <section class="col-lg-6">
        <div class="card glass-card shadow-lg h-100">
          <div class="card-body">
            <h2 class="h4 mb-3">1) Configure Generation</h2>

            <div class="mb-3">
              <label for="title" class="form-label">Title (optional)</label>
              <input id="title" class="form-control" placeholder="e.g., Intro to Databases" autocomplete="off" />
            </div>

            <div class="mb-3">
              <label for="sourceText" class="form-label">Source Material</label>
              <textarea id="sourceText" class="form-control" rows="10" placeholder="Paste raw text, notes, documentation, or transcript excerpts..." required aria-required="true"></textarea>
            </div>

            <div class="row g-3">
              <div class="col-sm-6">
                <label for="provider" class="form-label">Provider</label>
                <select id="provider" class="form-select">
                  <option value="llama_cpp">llama.cpp</option>
                  <option value="gpt">OpenAI GPT</option>
                  <option value="claude">Anthropic Claude</option>
                  <option value="gemini">Google Gemini</option>
                  <option value="lechat">LeChat</option>
                </select>
              </div>

              <div class="col-sm-6">
                <label for="model" class="form-label">Model</label>
                <input id="model" class="form-control" value="mistral-instruct" autocomplete="off" />
              </div>

              <div class="col-sm-4">
                <label for="count" class="form-label">Item Count</label>
                <input id="count" class="form-control" type="number" min="3" max="20" value="8" inputmode="numeric" />
              </div>

              <div class="col-sm-4">
                <label for="difficulty" class="form-label">Difficulty</label>
                <select id="difficulty" class="form-select">
                  <option value="easy">Easy</option>
                  <option value="medium" selected>Medium</option>
                  <option value="hard">Hard</option>
                </select>
              </div>

              <div class="col-sm-4">
                <label for="temperature" class="form-label">Temperature</label>
                <input id="temperature" class="form-control" type="number" min="0" max="1" step="0.1" value="0.3" inputmode="decimal" />
              </div>
            </div>

            <div class="mt-4 d-flex flex-wrap gap-2">
              <button id="generateBtn" class="btn btn-magenta">Generate Question Set</button>
              <button id="sampleBtn" class="btn btn-outline-light">Load Sample Text</button>
              <button id="clearBtn" class="btn btn-outline-warning">Clear</button>
            </div>
          </div>
        </div>
      </section>

      <section class="col-lg-6">
        <div class="card glass-card shadow-lg h-100">
          <div class="card-body">
            <h2 class="h4 mb-3">2) Output + Quality Checks</h2>

            <div id="status" class="alert alert-info small" role="status" aria-live="polite">Ready. Add source text and generate.</div>

            <div class="d-flex flex-wrap gap-2 mb-3">
              <button id="jsonBtn" class="btn btn-sm btn-outline-light" disabled>Export JSON</button>
              <button id="mdBtn" class="btn btn-sm btn-outline-light" disabled>Export Markdown</button>
              <button id="csvBtn" class="btn btn-sm btn-outline-light" disabled>Export CSV</button>
            </div>

            <div class="accordion" id="resultAccordion">
              <div class="accordion-item">
                <h3 class="accordion-header">
                  <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#payloadPane" aria-expanded="true" aria-controls="payloadPane">
                    Provider-Agnostic Payload Preview
                  </button>
                </h3>
                <div id="payloadPane" class="accordion-collapse collapse show">
                  <div class="accordion-body">
                    <pre id="payloadPreview" class="code-block mb-0">{ }</pre>
                  </div>
                </div>
              </div>

              <div class="accordion-item">
                <h3 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#itemsPane" aria-expanded="false" aria-controls="itemsPane">
                    Generated Items
                  </button>
                </h3>
                <div id="itemsPane" class="accordion-collapse collapse">
                  <div class="accordion-body">
                    <div id="renderedItems" class="vstack gap-3"></div>
                  </div>
                </div>
              </div>

              <div class="accordion-item">
                <h3 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#qcPane" aria-expanded="false" aria-controls="qcPane">
                    Evaluation Checklist
                  </button>
                </h3>
                <div id="qcPane" class="accordion-collapse collapse">
                  <div class="accordion-body" id="checklist"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
